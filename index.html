<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Wasted Death — Project Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Special+Elite&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --black: #030201;
            --deep: #070503;
            --gold: #c9a84c;
            --gold-dim: #7a5c1e;
            --rust: #8b2e10;
            --blood: #6b1010;
            --ash: #8e8070;
            --fog: #c0b498;
            --ivory: #f0e8d5;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black);
            color: var(--ivory);
            font-family: 'Libre+Baskerville', serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
        }

        /* ── CURSOR ── */
        #cur {
            width: 10px;
            height: 10px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: width .3s, height .3s, background .3s;
            mix-blend-mode: difference;
        }

        #cur2 {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        /* ── BACKGROUND ── */
        #bg-canvas {
            position: absolute;
            inset: 0;
            z-index: 0;
            opacity: 0.6;
        }

        .vignette {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: radial-gradient(circle at center, transparent 0%, rgba(3, 2, 1, 0.85) 100%);
            pointer-events: none;
        }

        .grain {
            position: fixed;
            inset: -200%;
            width: 400%;
            height: 400%;
            pointer-events: none;
            z-index: 2;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            animation: grain 0.5s steps(2) infinite;
        }

        @keyframes grain {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(-1%, -1%)
            }
        }

        /* ── MAIN CONTENT ── */
        .portal-ui {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
        }

        .portal-eyebrow {
            font-family: 'Special Elite', cursive;
            font-size: 0.65rem;
            letter-spacing: 0.6em;
            color: var(--gold-dim);
            text-transform: uppercase;
            margin-bottom: 2rem;
            opacity: 0;
        }

        .portal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.5rem, 10vw, 8rem);
            font-weight: 300;
            line-height: 0.9;
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .portal-title .accent {
            display: block;
            font-style: italic;
            color: var(--gold);
            filter: drop-shadow(0 0 30px rgba(201, 168, 76, 0.3));
        }

        .hub-nav {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-top: 1rem;
        }

        .hub-btn {
            position: relative;
            padding: 1.8rem 2.8rem;
            width: 280px;
            background: rgba(17, 13, 8, 0.4);
            border: 1px solid rgba(201, 168, 76, 0.12);
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            opacity: 0;
            transform: translateY(30px);
        }

        .hub-btn:hover {
            background: rgba(22, 16, 8, 0.7);
            border-color: var(--gold);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(201, 168, 76, 0.1);
        }

        .hub-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.05), transparent);
            transition: left 0.7s;
        }

        .hub-btn:hover::before {
            left: 100%;
        }

        .btn-label {
            font-family: 'Special Elite', cursive;
            font-size: 0.55rem;
            letter-spacing: 0.4em;
            color: var(--gold-dim);
            text-transform: uppercase;
        }

        .btn-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            color: var(--ivory);
            font-weight: 400;
        }

        .btn-desc {
            font-family: 'Libre+Baskerville', serif;
            font-size: 0.65rem;
            font-style: italic;
            color: var(--ash);
            opacity: 0.6;
            margin-top: 0.2rem;
        }

        .portal-footer {
            position: absolute;
            bottom: 3rem;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            opacity: 0;
        }

        .footer-line {
            font-family: 'Special Elite', cursive;
            font-size: 0.5rem;
            letter-spacing: 0.5em;
            color: var(--gold-dim);
            text-transform: uppercase;
        }

        @media (max-width: 900px) {
            .hub-nav {
                flex-direction: column;
                align-items: center;
                gap: 1.2rem;
            }

            .hub-btn {
                width: 320px;
                padding: 1.5rem 2rem;
            }

            .portal-title {
                font-size: 4rem;
            }
        }
    </style>
</head>

<body>

    <div id="cur"></div>
    <div id="cur2"></div>
    <div class="grain"></div>
    <div class="vignette"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="portal-ui">
        <p class="portal-eyebrow">Beta Group</p>
        <h1 class="portal-title">
            <span class="main">A Wasted</span>
            <span class="accent">Death</span>
        </h1>

        <div class="hub-nav">
            <a href="core.html" class="hub-btn" id="btn-about">
                <span class="btn-label"></span>
                <span class="btn-title">About</span>
                <span class="btn-desc">Narrative & Context</span>
            </a>
            <a href="Calender.html" class="hub-btn" id="btn-strategy">
                <span class="btn-label"></span>
                <span class="btn-title">Stratergy Planing</span>
                <span class="btn-desc">The 12-Month War Room</span>
            </a>
            <a href="project.html" class="hub-btn" id="btn-plan">
                <span class="btn-label"></span>
                <span class="btn-title">The Plan</span>
                <span class="btn-desc">Execution Roadmap</span>
            </a>
        </div>
    </div>

    <div class="portal-footer">
        <p class="footer-line">Official Project Portal &copy; 2026</p>
    </div>

    <script>
        /* ── CURSOR ── */
        const cur = document.getElementById('cur'), cur2 = document.getElementById('cur2');
        let mx = 0, my = 0, tx = 0, ty = 0;
        window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

        function updateCur() {
            cur.style.left = mx + 'px'; cur.style.top = my + 'px';
            tx += (mx - tx) * 0.15; ty += (my - ty) * 0.15;
            cur2.style.left = tx + 'px'; cur2.style.top = ty + 'px';
            requestAnimationFrame(updateCur);
        }
        updateCur();

        /* ── CANVAS BACKGROUND ── */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 2;
                this.op = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(201, 168, 76, ${this.op})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 150; i++) particles.push(new Particle());

        function anim() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(anim);
        }
        anim();

        /* ── ENTRANCE ANIMATIONS ── */
        window.onload = () => {
            const tl = gsap.timeline();
            tl.to('.portal-eyebrow', { opacity: 1, duration: 1.5, ease: 'power2.out' })
                .to('.portal-title', { opacity: 1, y: 0, duration: 1.5, ease: 'power4.out' }, '-=0.8')
                .to('.hub-btn', {
                    opacity: 1, y: 0,
                    duration: 1.2,
                    stagger: 0.2,
                    ease: 'power3.out'
                }, '-=1')
                .to('.portal-footer', { opacity: 0.4, duration: 1 }, '-=0.5');

            // Magnetic Effect on Buttons
            document.querySelectorAll('.hub-btn').forEach(btn => {
                btn.addEventListener('mousemove', e => {
                    const r = btn.getBoundingClientRect();
                    const x = e.clientX - r.left - r.width / 2;
                    const y = e.clientY - r.top - r.height / 2;
                    gsap.to(btn, { x: x * 0.1, y: y * 0.1, duration: 0.3, ease: 'power2.out' });
                    cur.style.width = '30px'; cur.style.height = '30px'; cur.style.background = 'rgba(201, 168, 76, 0.1)';
                });
                btn.addEventListener('mouseleave', () => {
                    gsap.to(btn, { x: 0, y: 0, duration: 0.5, ease: 'elastic.out(1, 0.3)' });
                    cur.style.width = '10px'; cur.style.height = '10px'; cur.style.background = 'transparent';
                });
            });
        };
    </script>
</body>

</html>
